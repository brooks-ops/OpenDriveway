services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: opendriveway
      POSTGRES_USER: opendriveway
      POSTGRES_PASSWORD: opendriveway
    ports:
      - "5432:5432"
    volumes:
      - opendriveway-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opendriveway"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  opendriveway-postgres:
