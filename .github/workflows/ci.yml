name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: opendriveway
          POSTGRES_PASSWORD: opendriveway
          POSTGRES_DB: opendriveway
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U opendriveway -d opendriveway"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      APP_ENV: test
      LOCAL_DEMO_MODE: "true"
      DATABASE_URL: postgresql+asyncpg://opendriveway:opendriveway@localhost:5432/opendriveway
      API_CORS_ORIGINS: http://localhost:5173,http://localhost:5174
      FRONTEND_URL: http://localhost:5173
      STRIPE_ENABLED: "false"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - run: npm install
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r backend/requirements.txt
      - run: npm run lint
      - run: npm run build
      - run: npm audit --audit-level=moderate
      - run: npm run backend:migrate
      - run: npm run backend:test
